server {
    listen 80;

    # [STAGE 1–3] 前端靜態檔
    # Stage 4 整合 Next.js 後，將此區塊改為下方的 proxy 設定
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # [STAGE 4 解鎖] Next.js Dashboard
