    #     proxy_set_header Connection '';   # SSE 需要 '' 而非 upgrade
    #     proxy_set_header Host $host;
    #     proxy_cache_bypass $http_upgrade;
    # }

    # [STAGE 3 解鎖] Bot Webhook 路由（LINE / Telegram）
