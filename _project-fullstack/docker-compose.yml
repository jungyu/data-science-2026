name: ds-project

# ================================================================
# 完整專案基礎設施模板
# 使用方式：複製整個 _project-fullstack/ 到你的專案目錄，
#           填入 .env 中的環境變數後執行 docker compose up -d
#
# 資料庫（PostgreSQL）由 `supabase start` 獨立管理，不在此檔案中。
# ================================================================

services:

  # ── [STAGE 4 解鎖] Next.js Dashboard ─────────────────────────
  # 整合方式：將 _project-nextjs/ 複製到 ./frontend/，取消下方註解
  # frontend:
  #   build: ./frontend
  #   container_name: ds-frontend
  #   restart: unless-stopped
  #   environment:
  #     MCP_SERVER_URL: http://mcp-server:3000   # 容器內網路，不需 localhost
  #     OPENAI_API_KEY: ${OPENAI_API_KEY}
  #   depends_on:
  #     - mcp-server

  # 反向代理：統一對外入口
  # Stage 1-3：/ → 靜態檔（frontend/dist）
  # Stage 4 解鎖後：/ → Next.js 服務（frontend:4000）
  # 路由規則見 nginx/default.conf
  nginx:
    image: nginx:alpine
    container_name: ds-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mcp-server
      - crawler

  # Playwright 爬蟲：抓取網頁內容，嵌入後送進 Qdrant 建立向量索引
  crawler:
    build: ./crawler
    container_name: ds-crawler
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      QDRANT_URL: http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_healthy

  # 向量資料庫：儲存嵌入向量，RAG 查詢時做相似度搜尋
  # Web UI → http://localhost:6333/dashboard
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ds-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API + Web UI
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MCP Server：把「搜尋向量庫、查 Supabase」包裝成 Claude 可呼叫的工具
  # SSE transport → Claude Desktop 在 claude_desktop_config.json 設定連 port 3000
  mcp-server:
    build: ./mcp-server
    container_name: ds-mcp-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      QDRANT_URL: http://qdrant:6333
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"  # 連宿主機的 supabase start
    depends_on:
      qdrant:
        condition: service_healthy

volumes:
  qdrant_data:
